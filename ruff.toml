target-version = "py313"
line-length = 100

[lint]
# F=pyflakes(bugs), E/W=pycodestyle, B=bugbear, I=imports,
# UP=pyupgrade, C4=comprehensions, SIM=simplificacoes.
select = ["F", "E", "W", "B", "I", "UP", "C4", "SIM"]
# Estilo compacto deliberado do projeto: linhas longas e statements
# em uma linha (if c: x / x; y) sao intencionais.
ignore = ["E501", "E701", "E702", "SIM105"]  # SIM105: padrao deliberado try/except: pass (degradacao graciosa)
